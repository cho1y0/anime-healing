<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniHealing - 맞춤 추천 메인</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/index.css">
</head>
<body>
    <header class="glass-header">
        <div class="header-container">
            <h1 class="logo">AniHealing ✨</h1>
            <nav class="nav-links">
                <span id="user-greeting" class="greeting">환영합니다!</span>
                <a href="preferences.html" class="nav-btn">🎨 취향 변경</a>
                <a href="watchlist.html" class="nav-btn">❤️ 보고싶다</a>
                <button id="logout-btn" class="nav-btn logout">로그아웃</button>
            </nav>
        </div>
    </header>

    <main class="main-container">
        <div class="filter-summary glass-panel">
            <h3>지금 적용된 맞춤 필터 🎯</h3>
            <div class="tags-container">
                <span class="badge score-badge">⭐ 5.0 ~ 10.0 점</span>
                <span class="badge genre-badge">액션</span>
                <span class="badge genre-badge">판타지</span>
            </div>
        </div>

        <div id="loading-spinner" class="loader hidden">
            <div class="spinner"></div>
            <p>당신을 위한 애니메이션을 찾는 중...</p>
        </div>

        <div id="anime-grid" class="card-grid">
            </div>
    </main>

    <script src="./js/app.js"></script>
    <script src="./js/index.js"></script>
</body>
</html>
