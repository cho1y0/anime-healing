<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniHealing - 취향 설정</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/preferences.css">
</head>
<body>
    <div class="pref-wrapper">
        <div class="pref-container">
            <div class="header-text">
                <h2>당신의 취향을 알려주세요 🎨</h2>
                <p>언제든지 다시 바꿀 수 있어요!</p>
            </div>

            <div class="section-box">
                <h3>✨ 빠른 취향 선택</h3>
                <div class="preset-group">
                    <button class="preset-btn" data-preset="healing">🌿 힐링 일상물</button>
                    <button class="preset-btn" data-preset="action">🔥 열혈 액션</button>
                    <button class="preset-btn" data-preset="romance">💖 달달 로맨스</button>
                    <button class="preset-btn" data-preset="masterpiece">👑 명작 (평점 8.5 이상)</button>
                </div>
            </div>

            <div class="section-box">
                <h3>⭐ 선호하는 평점 구간</h3>
                <div class="slider-container">
                    <div class="slider-values">
                        <span id="min-val-display">5.0</span> 점 ~ <span id="max-val-display">10.0</span> 점
                    </div>
                    <div class="range-sliders">
                        <input type="range" id="score-min" min="1.0" max="10.0" step="0.1" value="5.0">
                        <input type="range" id="score-max" min="1.0" max="10.0" step="0.1" value="10.0">
                    </div>
                </div>
            </div>

            <div class="section-box">
                <h3>🏷️ 선호 장르 (여러 개 선택 가능)</h3>
                <div class="genre-chips" id="genre-container">
                    <button class="chip-btn" data-id="1">액션</button>
                    <button class="chip-btn" data-id="22">로맨스</button>
                    <button class="chip-btn" data-id="36">일상</button>
                    <button class="chip-btn" data-id="4">코미디</button>
                    <button class="chip-btn" data-id="10">판타지</button>
                    <button class="chip-btn" data-id="8">드라마</button>
                    <button class="chip-btn" data-id="24">SF</button>
                    <button class="chip-btn" data-id="7">미스터리</button>
                </div>
            </div>

            <div class="summary-bar">
                <div class="summary-text">
                    <span id="summary-genres">선택된 장르 없음</span> • 
                    <span id="summary-score">5.0 ~ 10.0점</span>
                </div>
                <button type="button" class="btn-primary" id="save-pref-btn">애니메이션 추천받기 🚀</button>
            </div>
        </div>
    </div>

    <script src="./js/app.js"></script>
    <script src="./js/preferences.js"></script>
</body>
</html>
